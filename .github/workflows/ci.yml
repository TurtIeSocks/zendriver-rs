name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib --locked

  test-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc --locked

  # The only job that runs real-Chrome tests on more than one OS. Windows is
  # included deliberately: the Chrome *process lifecycle* (spawn, CDP
  # handshake, teardown of the process tree) is where this library's
  # platform-specific behavior actually lives, and it went untested on
  # Windows long enough to ship four lifecycle bugs. Kept to this job alone —
  # the nightly stealth/cloudflare/imperva suites stay Linux-only, since they
  # probe remote anti-bot services rather than OS process semantics and
  # Windows runner minutes bill at a premium.
  test-integration:
    strategy:
      # Windows is the newest, least-proven leg. A failure there must not
      # cancel the Linux run we depend on for signal.
      fail-fast: false
      matrix:
        include:
          # Linux is the reference platform: run everything.
          - os: ubuntu-latest
            filter: 'kind(test)'
          # Windows runs exactly ONE test binary, and that is deliberate —
          # though NOT for the reason this comment used to give.
          #
          # Corrected history. This filter was added on the theory that Chrome
          # on windows-latest cannot complete a loopback fetch from a
          # `wiremock::MockServer`, inferred from a first run that spent 4966s
          # (~83 min) with 4 wiremock-backed tests timing out. That theory was
          # WRONG, and the allowlist did not help: a later run had all 3
          # network-free `prerelease_verification` tests time out at 360s too,
          # having emitted nothing at all.
          #
          # The actual cause was `zendriver-stealth`'s Chrome version probe
          # exec'ing `chrome.exe --version` from inside `launch()`. Windows
          # Chrome has no POSIX print-and-exit for `--version` (upstream gates
          # it on `#if BUILDFLAG(IS_POSIX)`); with no existing browser session
          # to hand off to it starts a whole browser that never exits, and the
          # blocking `Command::output()` waits forever. Being a blocking call
          # inside the launch future, it also wedged the poll — which is why no
          # timeout ever fired and the hang was silent. EVERY test hung there,
          # before touching a socket. Fixed by reading the PE version resource
          # instead of executing anything.
          #
          # So loopback on this runner is UNVERIFIED, not broken — no test ever
          # got far enough to exercise it. Widening to `kind(test)` is now
          # plausible and worth measuring, but do it as its own change and watch
          # the clock: `.config/nextest.toml` bounds a hung test at 3 x 6 min,
          # which across 175 tests is still a job-budget fire if loopback does
          # turn out to be genuinely broken.
          #
          # Keeping the allowlist meanwhile is cheap and keeps this leg aimed at
          # what Windows is actually here for: `prerelease_verification` locks
          # the two genuinely OS-specific things — Chrome *discovery* (finding
          # chrome.exe at all) and the orphan/zombie process class from upstream
          # cdpdriver/zendriver#33 + #198, via
          # `repeated_launch_close_leaves_no_orphan_chrome_processes`, which
          # launches real Chrome 25x and diffs the system PID set.
          - os: windows-latest
            filter: 'binary_id(zendriver::prerelease_verification)'
    runs-on: ${{ matrix.os }}
    # Backstop only -- the per-test `slow-timeout` in .config/nextest.toml is
    # what actually names a stuck test. This exists so a hang that escapes it
    # (or a wedged compile) cannot ride the 6h default; Windows minutes bill
    # at 2x. Linux runs this in ~2m; Windows needs room for a cold compile
    # with an empty rust-cache, so 90m is deliberately generous rather than
    # tight -- a timeout here should mean "something is wrong", never "the
    # runner was slow today".
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Ensure Chrome available (preinstalled or apt fallback)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            echo "Using preinstalled $(google-chrome --version) at $(command -v google-chrome)"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "Using preinstalled $(google-chrome-stable --version) at $(command -v google-chrome-stable)"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "Using preinstalled $(chromium-browser --version) at $(command -v chromium-browser)"
          else
            echo "No Chrome/Chromium found on PATH — falling back to apt install"
            sudo apt-get update
            sudo apt-get install -y chromium-browser
            chromium-browser --version
          fi
      # windows-latest ships Google Chrome preinstalled, so there is no
      # install fallback to make. Assert it up front anyway: if the runner
      # image ever drops it, fail here with a clear reason instead of as an
      # opaque discovery error inside every test.
      - name: Ensure Chrome available (preinstalled)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\Google\Chrome\Application\chrome.exe",
            "${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe",
            "$env:LOCALAPPDATA\Google\Chrome\Application\chrome.exe"
          )
          $chrome = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $chrome) {
            Write-Host "::error::No chrome.exe in any location zendriver discovers."
            $candidates | ForEach-Object { Write-Host "  looked in: $_" }
            exit 1
          }
          $version = (Get-Item $chrome).VersionInfo.ProductVersion
          Write-Host "Using preinstalled Chrome $version at $chrome"
      - run: cargo nextest run --workspace --features integration-tests --locked --profile ci-integration -E '${{ matrix.filter }}'

  nightly-stealth-tests:
    if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Ensure Chrome available (preinstalled or apt fallback)
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            echo "Using preinstalled $(google-chrome --version) at $(command -v google-chrome)"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "Using preinstalled $(google-chrome-stable --version) at $(command -v google-chrome-stable)"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "Using preinstalled $(chromium-browser --version) at $(command -v chromium-browser)"
          else
            echo "No Chrome/Chromium found on PATH — falling back to apt install"
            sudo apt-get update
            sudo apt-get install -y chromium-browser
            chromium-browser --version
          fi
      - run: cargo nextest run --workspace --features stealth-tests --test stealth_phase2 --locked --profile ci-integration

  nightly-cloudflare-tests:
    if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Ensure Chrome available (preinstalled or apt fallback)
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            echo "Using preinstalled $(google-chrome --version) at $(command -v google-chrome)"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "Using preinstalled $(google-chrome-stable --version) at $(command -v google-chrome-stable)"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "Using preinstalled $(chromium-browser --version) at $(command -v chromium-browser)"
          else
            echo "No Chrome/Chromium found on PATH — falling back to apt install"
            sudo apt-get update
            sudo apt-get install -y chromium-browser
            chromium-browser --version
          fi
      - run: cargo nextest run --workspace --features cloudflare-tests --test cloudflare_phase5 --locked --profile ci-integration

  nightly-imperva-tests:
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * *'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Install Chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-browser
      - run: cargo nextest run --workspace --features imperva-tests --test imperva_v0 --locked --profile ci-integration

