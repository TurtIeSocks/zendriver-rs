name: MCP Coverage Check

# Runs nightly to catch any new public `zendriver` API items that have not
# been given an MCP coverage decision (covered by a tool, or explicitly
# excluded with a reason) in `crates/zendriver-mcp/mcp-coverage-ledger.toml`.
#
# Required tool: cargo-public-api v0.52.0 (needs nightly rustdoc JSON).
# BOTH the cargo-public-api version AND the nightly toolchain are pinned:
# rustdoc-JSON format drifts between nightlies, and an unpinned `@nightly`
# surfaced spurious "new" items (tower_http blanket-impl combinators) on every
# release — failing this check daily. The pinned nightly + a baseline cut with
# that same nightly makes the diff deterministic.
#
# To bump the pinned nightly:
#   1. Change `nightly-YYYY-MM-DD` in both places below.
#   2. Regenerate the baseline with the SAME toolchain:
#        cargo +nightly-YYYY-MM-DD public-api -p zendriver --all-features \
#            > crates/zendriver-mcp/public-api-baseline.txt
#   3. Commit the new baseline + updated workflow together.

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily
  push:
    branches: [main]
    paths:
      - 'crates/zendriver/**'
      - 'crates/zendriver-mcp/mcp-coverage-ledger.toml'
      - 'crates/zendriver-mcp/public-api-baseline.txt'
      - 'crates/zendriver-mcp/tests/public_api.rs'
      - '.github/workflows/mcp-coverage.yml'
  pull_request:
    paths:
      - 'crates/zendriver/**'
      - 'crates/zendriver-mcp/mcp-coverage-ledger.toml'
      - 'crates/zendriver-mcp/public-api-baseline.txt'
      - 'crates/zendriver-mcp/tests/public_api.rs'
      - '.github/workflows/mcp-coverage.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  mcp-coverage:
    name: MCP API Coverage Ledger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-10

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-public-api (pinned v0.52.0)
        run: cargo install cargo-public-api --locked --version 0.52.0

      - name: Run MCP coverage check
        env:
          PUBLIC_API_TOOLCHAIN: nightly-2026-06-10
        run: |
          cargo +nightly-2026-06-10 test \
            -p zendriver-mcp \
            --features public-api-check \
            --test public_api \
            --locked
