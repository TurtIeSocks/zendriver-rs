name: sync-cldr-locale

# Weekly resync of the vendored CLDR country -> locale table
# (crates/zendriver-stealth/src/geo/table.rs) from the pinned CLDR release.
# Opens an auto-merging PR gated on a sanity guard; no-ops when upstream is
# unchanged. CLDR ships ~twice a year, so most runs do nothing.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Record committed country count
        id: before
        run: |
          # Count country codes ("XX" uppercase 2-letter). Robust to rustfmt
          # line-wrapping of long multi-language rows; lang subtags are
          # lowercase so they do not match.
          before=$(grep -coE '"[A-Z][A-Z]"' crates/zendriver-stealth/src/geo/table.rs || echo 0)
          echo "count=$before" >> "$GITHUB_OUTPUT"
          echo "committed countries: $before"

      - name: Regenerate table
        run: |
          cargo run -p locale-gen
          cargo fmt -p zendriver-stealth

      - name: Delta guard (>20% country drop fails)
        env:
          BEFORE: ${{ steps.before.outputs.count }}
        run: |
          after=$(grep -coE '"[A-Z][A-Z]"' crates/zendriver-stealth/src/geo/table.rs || echo 0)
          echo "before=$BEFORE after=$after"
          if [ "$BEFORE" -gt 0 ] && [ "$after" -lt "$(( BEFORE * 80 / 100 ))" ]; then
            echo "::error::country count dropped >20% ($BEFORE -> $after); refusing to sync"
            exit 1
          fi

      - name: Sanity-guard test
        run: cargo test -p zendriver-stealth --features geo cldr_table_invariants --locked

      - name: Timezone table sanity guard
        run: |
          # The same regen (`cargo run -p locale-gen`) also emits the
          # country -> IANA timezone TIMEZONES table + TZDATA_VERSION
          # (crates/zendriver-stealth/src/geo/table.rs). Guard it the same
          # way as the CLDR table above, since it has no dedicated `cargo
          # test` invariant check.
          tz_count=$(grep -cE '^\s*\("[A-Z]{2}", "[^"]+"\),?$' crates/zendriver-stealth/src/geo/table.rs || echo 0)
          echo "timezone rows: $tz_count"
          if [ "$tz_count" -lt 100 ] || [ "$tz_count" -gt 300 ]; then
            echo "::error::TIMEZONES row count $tz_count out of sane bounds [100,300]"
            exit 1
          fi

          # Every TIMEZONES value must look like an IANA `Area/Location` zone.
          bad=$(grep -oE '\("[A-Z]{2}", "[^"]+"\)' crates/zendriver-stealth/src/geo/table.rs \
            | sed -E 's/^\("[A-Z]{2}", "([^"]+)"\)$/\1/' \
            | grep -vE '^[A-Za-z_]+/[A-Za-z0-9_+/-]+$' || true)
          if [ -n "$bad" ]; then
            echo "::error::TIMEZONES contains malformed zone value(s):"
            echo "$bad"
            exit 1
          fi

          version=$(grep -oE 'TZDATA_VERSION: &str = "[^"]*"' crates/zendriver-stealth/src/geo/table.rs \
            | grep -oE '"[^"]*"' | tr -d '"')
          if [ -z "$version" ]; then
            echo "::error::TZDATA_VERSION is empty"
            exit 1
          fi
          echo "TZDATA_VERSION: $version"

      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync CLDR locale table"
          title: "chore: sync CLDR locale table"
          body: |
            Automated weekly CLDR sync (`cargo run -p locale-gen && cargo fmt -p zendriver-stealth`).
            Version + per-country changes are visible in
            `crates/zendriver-stealth/src/geo/table.rs`.

            Auto-merges once CI + the table sanity guard pass. If the guard or CI
            fails (e.g. a CLDR shape change), the PR stays open for review.

            > Requires repo branch protection with required status checks and
            > "Allow auto-merge" enabled for the auto-merge step to take effect.
          branch: chore/sync-cldr-locale
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
