name: release-binaries

on:
  push:
    tags:
      - "zendriver-mcp-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing zendriver-mcp-v* release tag to attach binaries to"
        required: true

permissions:
  contents: write          # upload release assets
  id-token: write          # provenance attestation
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (linux aarch64)
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked -p zendriver-mcp --bin zendriver-mcp --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/zendriver-mcp
          OUT=zendriver-mcp-${{ matrix.target }}.tar.gz
          tar -czf "$OUT" -C "$(dirname "$BIN")" zendriver-mcp
          echo "ASSET=$OUT" >> "$GITHUB_ENV"
          echo "RAWBIN=$BIN" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/zendriver-mcp.exe
          OUT=zendriver-mcp-${{ matrix.target }}.zip
          ( cd "$(dirname "$BIN")" && 7z a "$GITHUB_WORKSPACE/$OUT" zendriver-mcp.exe >/dev/null )
          echo "ASSET=$OUT" >> "$GITHUB_ENV"
          echo "RAWBIN=$BIN" >> "$GITHUB_ENV"

      # `shasum` (a Perl script) ships on the Linux/macOS runners but NOT in
      # Git-for-Windows bash (exit 127: "shasum: command not found"), which
      # silently dropped the Windows binary from every release. Git-bash does
      # bundle coreutils' `sha256sum`, whose `<hash>  <file>` output matches
      # `shasum -a 256`, so the aggregated SHA256SUMS stays consistent.
      - name: Checksum (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Checksum (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: sha256sum "$ASSET" > "$ASSET.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.RAWBIN }}

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --repo "$GITHUB_REPOSITORY" --clobber

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Assemble combined SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir dl && cd dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.sha256'
          cat *.sha256 | sed 's#.*/##' > SHA256SUMS
          gh release upload "$TAG" SHA256SUMS --repo "$GITHUB_REPOSITORY" --clobber
