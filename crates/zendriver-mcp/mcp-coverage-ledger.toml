# zendriver` only surfaces items reachable through `zendriver`'s own paths,
# and `BrowserBuilder::stealth(profile: StealthProfile)` (already ledgered
# implicitly via its unchanged signature) passes the whole builder through,
# so no `zendriver`-crate-rooted item changed — `browser.rs` was not touched
# by this task. Confirmed no new items surfaced by re-running
# `cargo +nightly test -p zendriver-mcp --features public-api-check --test
# public_api` after this change.
