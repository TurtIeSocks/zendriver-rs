# MCP Coverage Ledger — zendriver public API vs zendriver-mcp tools
#
# Every public `zendriver` API item that was added in #24–#30 must have an
# entry here: either `covered = "<tool-name>"` (the MCP tool that exposes it)
# or `excluded = "<reason>"` (why it needs no MCP tool).
#
# The `tests/public_api.rs` test (feature `public-api-check`) diffs the
# current `zendriver` public API against `public-api-baseline.txt` and fails
# if any NEW item is absent from this ledger.
#
# Format:
#   [[entry]]
#   api      = "<path as it appears in cargo-public-api output>"
#   covered  = "<mcp-tool-name>"   # mutually exclusive with `excluded`
#   excluded = "<reason>"           # mutually exclusive with `covered`

# ── #30 BrowserBuilder::preference ──────────────────────────────────────────
[[entry]]
api = "zendriver::browser::BrowserBuilder::preference"
covered = "browser_open.preferences"

